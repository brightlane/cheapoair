# File: .github/workflows/deploy.yml
#
# GitHub Actions workflow for CheapoAir Deals affiliate site
# Repo:  brightlane/cheapoair
# Live:  https://brightlane.github.io/cheapoair/
#
# Triggers on every push to main.
# Runs build.py -> uploads /dist -> deploys to GitHub Pages.

name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run build.py
        run: python build.py

      - name: Verify dist output
        run: |
          echo "Files in dist:"
          ls -lh dist/
          echo "Total: $(ls dist/ | wc -l) files"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print URL
        run: echo "Live at ${{ steps.deployment.outputs.page_url }}"
